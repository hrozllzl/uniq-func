kind = "web"
previewPath = "/"
title = "볼링 점수 대시보드"
version = "1.0.0"
id = "artifacts/bowling-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18613

[services.development]
run = "pnpm --filter @workspace/bowling-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bowling-dashboard", "run", "build" ]
publicDir = "artifacts/bowling-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18613"
BASE_PATH = "/"
